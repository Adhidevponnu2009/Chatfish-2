<!DOCTYPE html>
<html>
<head>

<title>ChatFish</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#0ea5e9,#38bdf8);
min-height:100vh;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
color:white;
font-size:22px;
font-weight:bold;
}

/* CART */

.cart-btn{
background:white;
color:#0284c7;
padding:8px 14px;
border-radius:20px;
font-size:14px;
text-decoration:none;
}

/* OFFER */

.offer{
background:linear-gradient(90deg,#0ea5e9,#22c55e);
color:white;
text-align:center;
padding:12px;
font-size:18px;
font-weight:bold;
margin:10px;
border-radius:8px;
}

/* PRODUCTS GRID */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

/* CARD */

.product-card{
background:rgba(255,255,255,0.2);
backdrop-filter:blur(15px);
border-radius:18px;
border:1px solid rgba(255,255,255,0.3);
padding:18px;
text-align:center;
color:white;
box-shadow:0 8px 32px rgba(0,0,0,0.15);
}

/* IMAGE */

.product-card img{
width:100%;
height:160px;
object-fit:cover;
border-radius:12px;
margin-bottom:10px;
}

/* PRICE */

.price{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

/* BUTTON */

.add-btn{
background:white;
color:#0284c7;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
width:100%;
font-weight:bold;
}

/* POPUP */

.cart-popup{
position:fixed;
bottom:20px;
right:20px;
background:#22c55e;
color:white;
padding:12px 18px;
border-radius:25px;
display:none;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<header>

🐟 ChatFish

<a href="cart.html" class="cart-btn">
Cart 🛒
</a>

</header>

<div class="offer">
🔥 Fresh Fish Delivered To Your Door
</div>

<div class="products" id="products">

Loading products...

</div>

<div class="cart-popup" id="cartPopup">
Added to Cart 🐟
</div>

<script>

/* API */

let API="https://api.sheety.co/3dc786747b2bc829b0ad694ac2ac5ce8/fishShop/sheet1"

/* LOAD PRODUCTS */

fetch(API)

.then(res=>res.json())

.then(data=>{

let products=data.sheet1

let container=document.getElementById("products")

container.innerHTML=""

/* LOOP PRODUCTS */

products.forEach(p=>{

if(!p.fish) return

container.innerHTML+=`

<div class="product-card">

<img src="${p.imageLink}" alt="${p.fish}">

<h3>${p.fish}</h3>

<p class="price">QAR ${p.price}</p>

<button class="add-btn" onclick="addToCart('${p.fish}','${p.price}')">
Add to Cart
</button>

</div>

`

})

})

.catch(error=>{

document.getElementById("products").innerHTML=
"<p style='color:white'>Failed to load products</p>"

console.error(error)

})

/* ADD TO CART */

function addToCart(name,price){

let cart=JSON.parse(localStorage.getItem("cart")) || []

cart.push({
name:name,
price:Number(price),
qty:1
})

localStorage.setItem("cart",JSON.stringify(cart))

showPopup()

}

/* POPUP */

function showPopup(){

let popup=document.getElementById("cartPopup")

popup.style.display="block"

setTimeout(()=>{
popup.style.display="none"
},2000)

}

</script>

</body>
</html>
