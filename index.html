<!DOCTYPE html>
<html>
<head>

<title>ChatFish</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#0ea5e9,#38bdf8);
min-height:100vh;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
color:white;
font-size:22px;
font-weight:bold;
}

.cart-btn{
background:white;
color:#0284c7;
padding:8px 14px;
border-radius:20px;
text-decoration:none;
}

.offer{
background:linear-gradient(90deg,#0ea5e9,#22c55e);
color:white;
text-align:center;
padding:12px;
margin:10px;
border-radius:8px;
font-weight:bold;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.product-card{
background:rgba(255,255,255,0.2);
backdrop-filter:blur(15px);
border-radius:18px;
padding:18px;
text-align:center;
color:white;
box-shadow:0 8px 32px rgba(0,0,0,0.15);
}

.product-card img{
width:100%;
height:160px;
object-fit:cover;
border-radius:12px;
}

.price{
font-weight:bold;
margin:10px 0;
}

.add-btn{
background:white;
color:#0284c7;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
width:100%;
}

.cart-popup{
position:fixed;
bottom:20px;
right:20px;
background:#22c55e;
color:white;
padding:12px 18px;
border-radius:25px;
display:none;
}

</style>

</head>

<body>

<header>
🐟 ChatFish
<a href="cart.html" class="cart-btn">Cart 🛒</a>
</header>

<div class="offer">
🔥 Fresh Fish Delivered To Your Door
</div>

<div class="products" id="products"></div>

<div class="cart-popup" id="cartPopup">
Added to Cart 🐟
</div>

<script>

/* YOUR SHEETY API */

let API="https://api.sheety.co/3dc786747b2bc829b0ad694ac2ac5ce8/fishShop/sheet1"

let container=document.getElementById("products")

function loadProducts(){

fetch(API)
.then(res=>res.json())
.then(data=>{

let products=data.sheet1

container.innerHTML=""

products.forEach(p=>{

if(!p.fish) return

container.innerHTML+=`

<div class="product-card">

<img src="${p.imageLink}">

<h3>${p.fish}</h3>

<p class="price">QAR ${p.price}</p>

<button class="add-btn" onclick="addToCart('${p.fish}','${p.price}')">
Add to Cart
</button>

</div>

`

})

})

.catch(()=>{

container.innerHTML="<h3 style='color:white;text-align:center'>Failed to load products</h3>"

})

}

loadProducts()

/* AUTO REFRESH */

setInterval(loadProducts,5000)

/* CART */

function addToCart(name,price){

let cart=JSON.parse(localStorage.getItem("cart"))||[]

cart.push({
name:name,
price:price,
qty:1
})

localStorage.setItem("cart",JSON.stringify(cart))

let popup=document.getElementById("cartPopup")

popup.style.display="block"

setTimeout(()=>{
popup.style.display="none"
},2000)

}

</script>

</body>
</html>
