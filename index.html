<!DOCTYPE html>
<html>
<head>

<title>ChatFish</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#0ea5e9,#38bdf8);
min-height:100vh;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
font-size:22px;
font-weight:bold;
}

.cart-btn{
background:white;
color:#0284c7;
padding:8px 14px;
border-radius:20px;
text-decoration:none;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.product-card{
background:rgba(255,255,255,0.2);
backdrop-filter:blur(15px);
border-radius:18px;
padding:18px;
text-align:center;
}

.product-card img{
width:100%;
height:160px;
object-fit:cover;
border-radius:12px;
margin-bottom:10px;
}

.add-btn{
background:white;
color:#0284c7;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
width:100%;
}

</style>

</head>

<body>

<header>
🐟 ChatFish
<a href="cart.html" class="cart-btn">Cart 🛒</a>
</header>

<div class="products" id="products">
Loading products...
</div>

<script>

let API="https://api.sheety.co/99421662e3bb8e48529b587c457d21b8/fishShop/sheet1"

fetch(API)
.then(response => {

if(!response.ok){
throw new Error("Network response not OK")
}

return response.json()

})

.then(data => {

console.log("API DATA:",data)

let container=document.getElementById("products")

container.innerHTML=""

let products=data.sheet1

products.forEach(p=>{

container.innerHTML += `

<div class="product-card">

<img src="${p.imageLink}" alt="${p.fish}">

<h3>${p.fish}</h3>

<p>QAR ${p.price}</p>

<button class="add-btn" onclick="addToCart('${p.fish}','${p.price}')">
Add to Cart
</button>

</div>

`

})

})

.catch(error => {

console.error(error)

document.getElementById("products").innerHTML = `
<div style="padding:20px">
❌ Failed to load products<br><br>
Check API connection
</div>
`

})

function addToCart(name,price){

let cart=JSON.parse(localStorage.getItem("cart")) || []

cart.push({
name:name,
price:Number(price),
qty:1
})

localStorage.setItem("cart",JSON.stringify(cart))

alert("Added to Cart 🐟")

}

</script>

</body>
</html>
